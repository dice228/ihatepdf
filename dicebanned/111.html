    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: 'Bebas Neue', sans-serif;
        color: white;
        padding: 20px;
    }
    
    .container {
        text-align: center;
        max-width: 600px;
        width: 100%;
    }
    
    .logo-container {
        min-height: 80px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .logo-image {
        max-width: 400px;
        width: 100%;
        height: auto;
        animation: fadeInDown 0.8s ease;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }
    
    .fallback-title {
        font-size: clamp(2.5rem, 5vw, 4rem);
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: fadeInDown 0.8s ease;
        display: none;
    }
    
    .subtitle {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        margin-bottom: 50px;
        opacity: 0.95;
        letter-spacing: 1px;
        animation: fadeInUp 0.8s ease 0.2s both;
    }
    
    .social-links {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
        animation: fadeIn 1s ease 0.4s both;
    }
    
    .social-link {
        position: relative;
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        transition: all 0.3s ease;
        overflow: hidden;
    }
    
    .social-link:hover {
        transform: translateY(-5px) scale(1.05);
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .social-link::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }
    
    .social-link:hover::before {
        left: 100%;
    }
    
    .social-link svg {
        width: 40px;
        height: 40px;
        fill: white;
        z-index: 1;
    }
    
    .social-link img {
        width: 45px;
        height: 45px;
        object-fit: contain;
        z-index: 1;
    }
    
    .tooltip {
        position: absolute;
        bottom: -35px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 14px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        letter-spacing: 0.5px;
    }
    
    .social-link:hover .tooltip {
        opacity: 1;
    }
    
    /* Fallback для Newgrounds если изображение не загрузится */
    .newgrounds-fallback {
        display: none;
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 8px;
        position: relative;
    }
    
    .newgrounds-fallback::before {
        content: 'NG';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-weight: bold;
        color: #764ba2;
        font-size: 18px;
    }
    
    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 0.95;
            transform: translateY(0);
        }
    }
    
    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    
    @media (max-width: 480px) {
        .logo-image {
            max-width: 280px;
        }
        
        .social-links {
            gap: 20px;
        }
        
        .social-link {
            width: 70px;
            height: 70px;
        }
        
        .social-link svg {
            width: 35px;
            height: 35px;
        }
        
        .social-link img {
            width: 35px !important;
            height: 35px !important;
        }
    }
</style>
